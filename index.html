<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상단바</title>
    <link rel="stylesheet" href="normal.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 상단바 -->
    <header>
        <!-- top-bar -->
        <div class="top-bar">
            <div class="logo-menu01">
                <!-- 로고 -->
                <h1 class="logo-box">
                    <a href="#" target="_blank" title="홈으로 이동">
                        <img src="./image/h1.logo.svg" alt="로고">
                    </a>
                </h1>
                <!-- menu01 : 1차 메뉴 -->
                <nav class="menu01">
                    <ul class="menu01-ul">
                        <li class="m01-item m01-item01"><a href="#" target="_blank" title="제품">제품

                        <li class="m01-item m01-item02"><a href="#" target="_blank" title="이펙트">이펙트</a></li>

                        </a></li>
                        <li class="m01-item m01-item04"><a href="#" target="_blank" title="PRISM Plus">PRSIM Plus</a></li>
                    </ul>
                </nav>
            </div>
            <!-- 다운로드 버튼 -->
            <button class="download-btn">다운로드

            </button>
        </div>

</html>
