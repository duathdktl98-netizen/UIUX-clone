<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상단바</title>
    <link rel="stylesheet" href="normal.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 상단바 -->
    <header>
        <!-- popup -->
        <div class="popup">
            <a href="#" target="_blank" title="페이지 이동">
                <img src="./image/popup.png" alt="팝업">
            </a>
        </div>
        <!-- top-bar -->
        <div class="top-bar">
            <div class="logo-menu">
                <!-- 로고 -->
                <h1 class="logo-box">
                    <a href="#" target="_blank" title="홈으로 이동">
                        <img src="./image/h1.logo.svg" alt="로고">
                    </a>
                </h1>
                <!-- menu01 : 1차 메뉴 -->
                <nav class="menu01">
                    <ul class="menu01-ul">
                        <li class="m01-item m01-item01"><a href="#" target="_blank" title="제품">제품
                            <img class="m01-arrow-icon" src="./image/keyboard_arrow_down.svg" alt="화살표 아이콘"></a>
                        <!-- product-menu : 제품 2차 메뉴 -->
                        <ul class="product-menu-ul">
                            <li class="product-item product-item01"><a href="#" target="_blank" title="PRISM Live Studio">
                                <img class="p-icon01" src="./image/header_icon_01.png" alt="2차 메뉴 아이콘01">
                                PRISM Live Studio<span>·</span>모바일 앱</a>
                            </li>
                            <li class="product-item product-item02"><a href="#" target="_blank" title="PRISM Live Studio 데스크톱 앱">
                                <img class="p-icon01" src="./image/header_icon_01.png" alt="2차 메뉴 아이콘01">
                                PRISM Live Studio<span>·</span>데스크톱 앱</a>
                            </li>
                            <li class="product-item product-item03"><a href="#" target="_blank" title="PRISM Live Studio Lens 데스크톱 앱">
                                <img class="p-icon02" src="./image/header_icon_02.png" alt="2차 메뉴 아이콘02">
                                PRISM Live Studio Lens<span>·</span>데스크톱 앱</a>
                            </li>
                        </ul></li>
                        <li class="m01-item m01-item02"><a href="#" target="_blank" title="이펙트">이펙트</a></li>
                        <li class="m01-item m01-item03"><a href="#" target="_blank" title="커뮤니티">커뮤니티
                            <img class="m01-arrow-icon" src="./image/keyboard_arrow_down.svg" alt="화살표 아이콘"></a>
                        <!-- comu-menu : 커뮤니티 2차 메뉴 -->
                        <ul class="comu-menu-ul">
                            <li class="comu-item comu-item01"><a href="#" target="_blank" title="사용자 가이드">사용자 가이드
                                <svg class="comu-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M6.4 18L5 16.6L14.6 7H6V5H18V17H16V8.4L6.4 18Z" fill="currentColor"/></svg>
                            </a></li>
                            <li class="comu-item comu-item02"><a href="#" target="_blank" title="디스코드">디스코드
                                <svg class="comu-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M6.4 18L5 16.6L14.6 7H6V5H18V17H16V8.4L6.4 18Z" fill="currentColor"/></svg>
                            </a></li>
                            <li class="comu-item comu-item03"><a href="#" target="_blank" title="유튜브">유튜브
                                <svg class="comu-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M6.4 18L5 16.6L14.6 7H6V5H18V17H16V8.4L6.4 18Z" fill="currentColor"/></svg>
                            </a></li>
                        </ul></li>
                        <li class="m01-item m01-item04"><a href="#" target="_blank" title="PRISM Plus">PRISM Plus</a></li>
                    </ul>
                </nav>
            </div>
            <!-- 다운로드 버튼 -->
            <button type="button" class="download-btn">다운로드
                <svg class="arrow-icon" width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
	                <path d="M12 15.4L6 9.4L7.4 8L12 12.6L16.6 8L18 9.4L12 15.4Z" fill="currentColor"/>
                </svg>
            </button>
        </div>
    </header>
</body>
</html>
